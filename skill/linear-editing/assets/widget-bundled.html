<!--
Hello-world widget. Vite inlines widget.css + widget.ts into
skill/<skill-name>/assets/widget-bundled.html at build. ~2.7 KB.
Replace:
- Mustache markers (lowercase, e.g. {{title}}). render.py substitutes
these from the JSON payload at runtime. List new markers in
bundle.test.ts so size assertions catch drops.
- data-id / data-snippet carry per-item identity back to widget.ts.
- Class names drive CSS + JS. Pick domain-specific names.
- The sr-only h2 reads to screen readers. Replace with one sentence.
- Keep the .bar block. widget.ts reads #applyBtn and .count.
-->
<h2
class="sr-only"
style="position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0, 0, 0, 0)"
>
Template widget. Type a response and apply to send it back to the chat.
</h2>
<div class="widget">
<h1>{{title}}</h1>
<p class="sub">{{prompt}}</p>
<!-- Replace this textarea with your widget's interactive items. -->
<textarea
class="response-input"
placeholder="Type your response..."
aria-label="Response"
></textarea>
<!-- Action bar - keep the structure; widget.ts reads these selectors. -->
<div class="bar">
<span class="count">No response yet</span>
<div class="actions">
<button id="applyBtn" disabled>Apply</button>
</div>
</div>
</div>
